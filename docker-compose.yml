version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: planitt_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    command: ["serve"]

  postgres:
    image: postgres:latest
    container_name: planitt_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: planitt_db
    ports:
      - "5433:5433"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ollama_data:
  pg_data:
